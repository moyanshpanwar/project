name: ucstw_env
version: 1.0

api:
  protocol: http
  base_url: http://localhost:8000

  endpoints:
    reset:
      method: POST
      path: /reset
      response: { env_id: str, state: object }

    step:
      method: POST
      path: /step
      body: { env_id: str, action: str }
      response: { state: object, reward: float, done: bool, info: object }

    state:
      method: GET
      path: /state/{env_id}
      response: object

actions:
  type: discrete
  space:
    - MOVE_N
    - MOVE_S
    - MOVE_E
    - MOVE_W
    - PICK
    - DROP
    - WAIT
    - ACCEPT_i  # dynamic index

evaluation:
  metric: score
  range: [0.0, 1.0]